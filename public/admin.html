<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Takimet</title>
  <style>
    :root {
      --ink: #f6efe1;
      --muted-ink: #c7bcaa;
      --panel: rgba(9, 10, 10, 0.7);
      --panel-strong: rgba(8, 8, 7, 0.94);
      --line: rgba(207, 174, 112, 0.34);
      --line-strong: rgba(207, 174, 112, 0.56);
      --accent: #d0ad6a;
      --accent-strong: #f0d08b;
      --available: #8fa894;
      --available-hover: #a3bca7;
      --available-text: #101510;
      --reserved: #7b3037;
      --reserved-hover: #8b3a42;
      --reserved-text: #fff1ec;
      --time-bg: rgba(7, 8, 8, 0.72);
      --cell-bg: rgba(246, 239, 225, 0.035);
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.46);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    body {
      font-family: 'Trebuchet MS', 'Gill Sans', sans-serif;
      background:
        linear-gradient(rgba(3, 4, 4, 0.58), rgba(3, 4, 4, 0.78)),
        url('https://png.pngtree.com/background/20250125/original/pngtree-barber-shop-salon-setup-with-classic-chairs-and-elegant-mirrors-picture-image_16217040.jpg') center/cover fixed no-repeat;
      color: var(--ink);
      padding: 22px 18px 20px;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      animation: page-in 520ms var(--ease) both;
    }
    h1 {
      text-align: center;
      margin: 0 0 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 10px 34px rgba(0, 0, 0, 0.56);
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      line-height: 1.2;
    }
    h2 {
      margin: 0;
      color: var(--accent);
      letter-spacing: 0.04em;
      font-weight: 600;
      font-size: 1rem;
    }
    .container {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: nowrap;
    }
    .mobile-controls {
      display: none;
    }
    .manual-booking {
      max-width: 980px;
      margin: 0 auto 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17, 18, 18, 0.82), var(--panel));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      animation: panel-rise 560ms var(--ease) both;
      transition: transform 220ms var(--ease), border-color 220ms ease, box-shadow 220ms ease;
    }
    .manual-booking:hover,
    .barber-container:hover,
    .settings-panel.active:hover {
      transform: translateY(-3px);
      border-color: rgba(207, 174, 112, 0.5);
      box-shadow: 0 32px 86px rgba(0, 0, 0, 0.54);
    }
    .manual-booking-header {
      margin-bottom: 14px;
    }
    .manual-booking-header p {
      margin: 6px 0 0;
      color: var(--muted-ink);
      line-height: 1.45;
      font-size: 14px;
    }
    .manual-booking-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1.3fr auto;
      gap: 10px;
      align-items: end;
    }
    .manual-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }
    .manual-field label {
      color: var(--muted-ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .manual-field input,
    .manual-field select {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(246, 239, 225, 0.065);
      color: var(--ink);
      font: inherit;
      box-sizing: border-box;
      min-width: 0;
      max-width: 100%;
    }
    .manual-field input[type="date"] {
      display: block;
      -webkit-appearance: none;
      appearance: none;
    }
    .manual-field select option {
      color: #101010;
    }
    .manual-booking button {
      min-height: 44px;
      margin: 0;
      padding: 0 18px;
      white-space: nowrap;
    }
    .manual-feedback {
      min-height: 20px;
      margin: 12px 0 0;
      font-weight: 700;
      line-height: 1.35;
    }
    .manual-feedback.success {
      color: #a9d8ad;
    }
    .manual-feedback.error {
      color: #ffb2a8;
    }
    .segmented-control,
    .day-strip {
      display: flex;
      gap: 8px;
    }
    .segmented-control button,
    .day-strip button {
      min-height: 44px;
      margin: 0;
      padding: 9px 12px;
      border: 1px solid var(--line);
      background: rgba(246, 239, 225, 0.055);
      color: var(--ink);
      box-shadow: none;
      font-size: 14px;
      transition: transform 180ms var(--ease), background-color 180ms ease;
    }
    .segmented-control button.active,
    .day-strip button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #101010;
    }
    .segmented-control button:active,
    .day-strip button:active {
      transform: scale(0.97);
    }
    .barber-container {
      background: linear-gradient(180deg, rgba(17, 18, 18, 0.82), var(--panel));
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
      max-width: none;
      min-width: 0;
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: panel-rise 640ms var(--ease) both;
      transition: transform 220ms var(--ease), border-color 220ms ease, box-shadow 220ms ease;
    }
    table {
      border-collapse: separate;
      border-spacing: 5px;
      width: 100%;
      table-layout: fixed;
      margin-top: 14px;
      background: transparent;
      font-size: 12px;
    }
    th, td {
      border: 1px solid rgba(207, 174, 112, 0.16);
      text-align: center;
      vertical-align: middle;
      width: calc((100% - 80px) / 7); /* 7 days columns */
      height: 32px;
      cursor: pointer;
      border-radius: 8px;
      padding: 4px 5px;
      box-sizing: border-box;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: background-color 0.25s ease, transform 0.2s ease, filter 0.2s ease;
      user-select: none;
      background: var(--cell-bg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 8px 18px rgba(0, 0, 0, 0.16);
    }
    /* Time column */
    th.time-col, td.time-col {
      width: 62px;
      cursor: default;
      background: var(--time-bg);
      color: var(--accent);
      font-weight: 600;
      border-radius: 12px;
      font-size: 11px;
      line-height: 1.2;
      padding: 5px 4px;
      border-color: rgba(207, 174, 112, 0.24);
    }
    th {
      background: linear-gradient(180deg, rgba(207, 174, 112, 0.18), rgba(207, 174, 112, 0.055));
      color: var(--ink);
      font-weight: 600;
      height: 50px;
      font-size: 12px;
      line-height: 1.25;
      border-color: rgba(207, 174, 112, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14), 0 10px 22px rgba(0, 0, 0, 0.18);
    }
    td.available {
      background: linear-gradient(180deg, rgba(169, 199, 173, 0.82), rgba(143, 168, 148, 0.76) 62%, rgba(119, 145, 124, 0.72));
      color: var(--available-text);
      font-weight: 600;
      border-color: rgba(166, 197, 171, 0.42);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.34), 0 10px 22px rgba(34, 54, 38, 0.22);
    }
    td.available:hover {
      background: linear-gradient(180deg, rgba(188, 216, 191, 0.9), rgba(158, 188, 163, 0.82) 62%, rgba(134, 163, 139, 0.78));
      transform: translateY(-2px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.38), 0 14px 26px rgba(34, 54, 38, 0.28);
    }
    td.available:active,
    td.reserved:active {
      transform: translateY(0) scale(0.96);
      filter: brightness(1.04);
    }
    td.reserved {
      background: linear-gradient(180deg, rgba(128, 53, 61, 0.86), rgba(101, 39, 46, 0.78) 62%, rgba(76, 27, 33, 0.76));
      color: var(--reserved-text);
      font-weight: 600;
      border-color: rgba(160, 72, 82, 0.46);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 10px 22px rgba(50, 26, 22, 0.24);
    }
    td.reserved:hover {
      background: linear-gradient(180deg, rgba(145, 61, 70, 0.9), rgba(111, 44, 52, 0.84) 62%, rgba(88, 32, 39, 0.8));
      filter: brightness(1.02);
    }
    td.no-slot {
      background: linear-gradient(180deg, rgba(246, 239, 225, 0.018), rgba(246, 239, 225, 0.006));
      border-color: rgba(207, 174, 112, 0.075);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }
    td.past {
      background: linear-gradient(180deg, rgba(132, 49, 55, 0.9), rgba(100, 35, 41, 0.82) 62%, rgba(73, 23, 29, 0.78));
      color: #fff1ec;
      cursor: default;
      font-weight: 700;
      border-color: rgba(177, 74, 83, 0.62);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 10px 22px rgba(67, 24, 20, 0.24);
    }
    /* Modal styles */
    #modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
    }
    #modal.active {
      display: flex;
      animation: overlay-in 180ms ease both;
    }
    #modal-content {
      background: linear-gradient(180deg, rgba(18, 18, 17, 0.98), var(--panel-strong));
      padding: 30px;
      border-radius: 24px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      width: 320px;
      text-align: center;
      user-select: text;
      animation: modal-pop 240ms var(--ease) both;
    }
    #modal-content h3 {
      margin-top: 0;
      margin-bottom: 15px;
      color: var(--accent);
    }
    #modal-content input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(246, 239, 225, 0.065);
      color: var(--ink);
      font-size: 16px;
      box-sizing: border-box;
    }
    #modal-content input::placeholder {
      color: var(--muted-ink);
    }
    #modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button {
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #101010;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin-top: 10px;
      user-select: none;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      transition: transform 180ms var(--ease), box-shadow 180ms ease, filter 180ms ease;
    }
    button:hover {
      filter: brightness(1.04);
      transform: translateY(-2px);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.34);
    }
    button:active {
      transform: translateY(0) scale(0.98);
    }
    #modal-cancel-btn {
      background: linear-gradient(135deg, #7b3037, #4d1d24);
      color: #fff1ec;
    }
    #modal-cancel-btn:hover {
      filter: brightness(1.05);
    }
    #feedback {
      margin-top: 10px;
      min-height: 18px;
      font-weight: 600;
    }
    .admin-actions {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
      gap: 10px;
      flex-wrap: wrap;
    }
    #logout-btn {
      width: auto;
      min-width: 110px;
      margin: 0;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #7b3037, #4d1d24);
      color: #fff1ec;
      font-size: 14px;
    }
    #settings-toggle {
      width: auto;
      min-width: 110px;
      margin: 0;
      padding: 10px 18px;
      font-size: 14px;
    }
    .settings-panel {
      display: none;
      max-width: 680px;
      margin: 0 auto 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(17, 18, 18, 0.88), var(--panel));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .settings-panel.active {
      display: block;
      animation: panel-rise 360ms var(--ease) both;
    }
    .settings-panel p {
      margin: 6px 0 14px;
      color: var(--muted-ink);
      line-height: 1.45;
      font-size: 14px;
    }
    .settings-form {
      display: grid;
      gap: 10px;
    }
    .settings-field {
      display: grid;
      gap: 6px;
    }
    .settings-field label {
      color: var(--muted-ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .settings-field input {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(246, 239, 225, 0.065);
      color: var(--ink);
      font: inherit;
      box-sizing: border-box;
    }
    .settings-feedback {
      min-height: 20px;
      margin: 10px 0 0;
      font-weight: 700;
      line-height: 1.35;
    }
    .settings-feedback.success {
      color: #a9d8ad;
    }
    .settings-feedback.error {
      color: #ffb2a8;
    }
    .language-switch {
      display: inline-flex;
      gap: 5px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(7, 8, 8, 0.78);
    }
    .language-switch button {
      width: auto;
      min-width: 42px;
      min-height: 30px;
      margin: 0;
      padding: 0 10px;
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      font-size: 13px;
    }
    .language-switch button.active {
      color: #101010;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }
    @keyframes page-in {
      from {
        opacity: 0;
        transform: translateY(10px);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }
    @keyframes panel-rise {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes overlay-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes modal-pop {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }
      .container {
        flex-wrap: wrap;
      }
      .barber-container {
        flex: 1 1 100%;
      }
      .manual-booking-form {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .manual-booking button {
        grid-column: 1 / -1;
      }
    }
    @media (max-width: 700px) {
      body {
        padding: 14px 10px 18px;
        background-attachment: scroll;
      }
      h1 {
        margin-bottom: 12px;
        font-size: 1.2rem;
      }
      .admin-actions {
        margin-bottom: 10px;
      }
      .manual-booking {
        margin-bottom: 12px;
        padding: 14px;
      }
      .settings-panel {
        margin-bottom: 12px;
        padding: 14px;
      }
      .manual-booking-form {
        grid-template-columns: 1fr;
        width: 100%;
      }
      .manual-booking button {
        width: 100%;
      }
      .mobile-controls {
        display: grid;
        gap: 10px;
        margin: 0 auto 12px;
        max-width: 520px;
      }
      .segmented-control {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .day-strip {
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: thin;
      }
      .day-strip button {
        flex: 0 0 76px;
        display: grid;
        gap: 2px;
        line-height: 1.15;
      }
      .day-strip small {
        color: inherit;
        font-size: 11px;
        opacity: 0.82;
      }
      .container {
        display: block;
      }
      .barber-container {
        display: none;
        padding: 12px;
        border-radius: 16px;
      }
      .barber-container.active {
        display: flex;
      }
      h2 {
        font-size: 1.05rem;
      }
      table {
        border-spacing: 7px;
        font-size: 14px;
      }
      th, td {
        height: 52px;
        border-radius: 14px;
        font-size: 13px;
      }
      th.time-col,
      td.time-col {
        width: 72px;
        font-size: 12px;
      }
      #modal-content {
        width: min(92vw, 360px);
        padding: 22px;
        border-radius: 18px;
      }
      #modal-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <h1 data-i18n="pageTitle">Admin - Menaxho takimet</h1>
  <div class="admin-actions">
    <button id="settings-toggle" type="button" data-i18n="settings" aria-expanded="false" aria-controls="settings-panel">Cilësimet</button>
    <button id="logout-btn" type="button" data-i18n="logout">Dil</button>
    <div class="language-switch" aria-label="Language">
      <button type="button" data-lang-option="sq">AL</button>
      <button type="button" data-lang-option="en">EN</button>
    </div>
  </div>
  <section class="settings-panel" id="settings-panel" aria-labelledby="settings-title">
    <h2 id="settings-title" data-i18n="settingsTitle">Cilësimet</h2>
    <p data-i18n="settingsIntro">Ndrysho fjalëkalimin e adminit. Pas ndryshimit, hyrjet e reja do përdorin fjalëkalimin e ri.</p>
    <form class="settings-form" id="password-form">
      <div class="settings-field">
        <label for="current-password" data-i18n="currentPassword">Fjalëkalimi aktual</label>
        <input type="password" id="current-password" autocomplete="current-password" required />
      </div>
      <div class="settings-field">
        <label for="new-password" data-i18n="newPassword">Fjalëkalimi i ri</label>
        <input type="password" id="new-password" autocomplete="new-password" required />
      </div>
      <div class="settings-field">
        <label for="confirm-password" data-i18n="confirmPassword">Konfirmo fjalëkalimin</label>
        <input type="password" id="confirm-password" autocomplete="new-password" required />
      </div>
      <button type="submit" data-i18n="savePassword">Ruaj fjalëkalimin</button>
      <p class="settings-feedback" id="settings-feedback" aria-live="polite"></p>
    </form>
  </section>
  <div class="mobile-controls" aria-label="Schedule filters">
    <div class="segmented-control" id="barber-tabs"></div>
    <div class="day-strip" id="day-tabs"></div>
  </div>
  <div class="container">
    <div class="barber-container" id="deni-container">
      <h2 data-i18n="deniSchedule">Orari i Denit</h2>
      <table id="deni-calendar"></table>
    </div>
    <div class="barber-container" id="cerri-container">
      <h2 data-i18n="cerriSchedule">Orari i Cerrit</h2>
      <table id="cerri-calendar"></table>
    </div>
  </div>

  <section class="manual-booking" aria-labelledby="manual-booking-title">
    <div class="manual-booking-header">
      <h2 id="manual-booking-title" data-i18n="manualTitle">Shto takim manualisht</h2>
      <p data-i18n="manualIntro">Zgjidh berberin, datën, orën dhe emrin e klientit. Nëse orari është i zënë, takimi nuk shtohet.</p>
    </div>
    <form class="manual-booking-form" id="manual-booking-form">
      <div class="manual-field">
        <label for="manual-barber" data-i18n="manualBarber">Berberi</label>
        <select id="manual-barber" required>
          <option value="deni">Deni</option>
          <option value="cerri">Cerri</option>
        </select>
      </div>
      <div class="manual-field">
        <label for="manual-date" data-i18n="manualDate">Data</label>
        <input type="date" id="manual-date" required />
      </div>
      <div class="manual-field">
        <label for="manual-time" data-i18n="manualTime">Ora</label>
        <select id="manual-time" required></select>
      </div>
      <div class="manual-field">
        <label for="manual-name" data-i18n="manualName">Klienti</label>
        <input type="text" id="manual-name" data-i18n-placeholder="customerPlaceholder" placeholder="Shkruaj emrin e klientit" required />
      </div>
      <button type="submit" data-i18n="manualSubmit">Shto takimin</button>
    </form>
    <p class="manual-feedback" id="manual-booking-feedback" aria-live="polite"></p>
  </section>

  <!-- Modal -->
  <div id="modal">
    <div id="modal-content">
      <h3 id="modal-title"></h3>
      <p id="modal-info"></p>
      <input type="text" id="customer-name" data-i18n-placeholder="customerPlaceholder" placeholder="Shkruaj emrin e klientit" />
      <div id="modal-buttons">
        <button id="modal-book-btn" data-i18n="book">Rezervo</button>
        <button id="modal-cancel-btn" data-i18n="cancelBooking">Anulo rezervimin</button>
        <button id="modal-close-btn" data-i18n="close">Mbyll</button>
      </div>
      <p id="feedback"></p>
    </div>
  </div>

  <script>
   const barberNames = ['deni', 'cerri'];
    const DAY_LABELS = {

    function getLanguage() {
      return localStorage.getItem('haircuttime_language') || 'sq';
    }

    function t(key) {
      return translations[getLanguage()][key];
    }

    function dayLabel(date) {
      return DAY_LABELS[getLanguage()][date.getDay()];
    }

    function applyLanguage() {
      const language = getLanguage();
      document.documentElement.lang = language;
      document.title = translations[language].documentTitle;

      document.querySelectorAll('[data-i18n]').forEach(element => {
        element.textContent = translations[language][element.dataset.i18n];
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
        element.placeholder = translations[language][element.dataset.i18nPlaceholder];
      });

      document.querySelectorAll('[data-lang-option]').forEach(button => {
        button.classList.toggle('active', button.dataset.langOption === language);
      });
    }

    function setLanguage(language) {
      localStorage.setItem('haircuttime_language', language);
      applyLanguage();
      refreshCalendars();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getNext7Days() {
      const now = new Date();
      const days = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(now);
        d.setHours(0,0,0,0);
        d.setDate(now.getDate() + i);
        days.push(d);
      }
      return days;
    }

    function formatBarberName(barber) {
      return barber.charAt(0).toUpperCase() + barber.slice(1);
    }

    function formatDate(date) {
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = String(date.getFullYear()).slice(-2);
      return `${day}/${month}/${year}`;
    }

    function formatTime(date) {
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function toDateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function getVisibleDays() {
      const days = getNext7Days();
      return mobileQuery.matches ? [days[selectedDayIndex]] : days;
    }

    function updateVisibleContainers() {
      barberNames.forEach(barber => {
        const container = document.getElementById(`${barber}-container`);
        container.classList.toggle('active', !mobileQuery.matches || barber === selectedBarber);
      });
    }

    function renderMobileControls() {
      const barberTabs = document.getElementById('barber-tabs');
      const dayTabs = document.getElementById('day-tabs');
      const days = getNext7Days();

      barberTabs.innerHTML = barberNames.map(barber => `
        <button type="button" class="${barber === selectedBarber ? 'active' : ''}" data-barber-tab="${barber}">
          ${formatBarberName(barber)}
        </button>
      `).join('');

      dayTabs.innerHTML = days.map((day, index) => `
        <button type="button" class="${index === selectedDayIndex ? 'active' : ''}" data-day-tab="${index}">
          ${dayLabel(day)}
          <small>${formatDate(day)}</small>
        </button>
      `).join('');
    }

    async function fetchAppointments(barber) {
      const res = await fetch(`${API_BASE}/api/admin/appointments/${barber}`);
      if (res.status === 401) {
        window.location.href = '/login.html';
        return [];
      }
      const data = await res.json();
      return data;
    }

    function createTableHeader(days) {
      let thead = `<tr><th class="time-col">${t('time')}</th>`;
      for(let day of days) {
        thead += `<th>${dayLabel(day)}<br>${formatDate(day)}</th>`;
      }
      thead += '</tr>';
      return thead;
    }

    function createTableBody(appointments, days, barber) {
  const startHour = 9;
  const slotsPerDay = 24; // 12 hours * 2 (half-hour slots)
  const now = new Date();

  let tbody = '';

  for (let slotIndex = 0; slotIndex < slotsPerDay; slotIndex++) {
    const slotHour = startHour + Math.floor(slotIndex / 2);
    const slotMinute = (slotIndex % 2) * 30;
    const timeLabel = `${String(slotHour).padStart(2, '0')}:${slotMinute === 0 ? '00' : '30'}`;

    tbody += `<tr><td class="time-col">${timeLabel}</td>`;

    for (let dayIndex = 0; dayIndex < days.length; dayIndex++) {
      const day = days[dayIndex];
      const slotStart = new Date(day);
      slotStart.setHours(slotHour, slotMinute, 0, 0);
      const isToday = slotStart.toDateString() === now.toDateString();

      if (isToday && slotStart < now) {
        tbody += `<td class="past" title="${t('passedTitle')}">${t('passed')}</td>`;
        continue;
      }

      // Find appointment exactly matching this slot (year, month, day, hour, minute)
      const appointment = appointments.find(app => {
        const appStart = new Date(app.start);
        return (
          appStart.getFullYear() === slotStart.getFullYear() &&
          appStart.getMonth() === slotStart.getMonth() &&
          appStart.getDate() === slotStart.getDate() &&
          appStart.getHours() === slotStart.getHours() &&
          appStart.getMinutes() === slotStart.getMinutes()
        );
      });
      if (appointment && appointment.customer) {
  tbody += `<td class="reserved" data-id="${escapeHtml(appointment._id)}" title="${t('reservedBy')} ${escapeHtml(appointment.customer)}">
              ${escapeHtml(appointment.customer)}
            </td>`;
} else if (appointment) {
        tbody += `<td class="available" data-barber="${escapeHtml(barber)}" data-start="${escapeHtml(slotStart.toISOString())}" title="${t('availableTitle')}">
                    ${timeLabel}
                  </td>`;
      } else {
        tbody += `<td class="no-slot" title="${t('noSlotTitle')}"></td>`;
      }
      
    }
    tbody += '</tr>';
  }
  return tbody;
}

    

    async function renderCalendar(barber) {
      const calendar = document.getElementById(`${barber}-calendar`);
      const appointments = await fetchAppointments(barber);
      const days = getVisibleDays();

      const thead = createTableHeader(days);
      const tbody = createTableBody(appointments, days, barber);

      calendar.innerHTML = thead + tbody;
    }


    // Modal elements
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalInfo = document.getElementById('modal-info');
    const customerInput = document.getElementById('customer-name');
    const feedback = document.getElementById('feedback');
    const btnBook = document.getElementById('modal-book-btn');
    const btnCancelBooking = document.getElementById('modal-cancel-btn');
    const btnClose = document.getElementById('modal-close-btn');
    const btnLogout = document.getElementById('logout-btn');
    const btnSettings = document.getElementById('settings-toggle');
    const settingsPanel = document.getElementById('settings-panel');
    const passwordForm = document.getElementById('password-form');
    const currentPasswordInput = document.getElementById('current-password');
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const settingsFeedback = document.getElementById('settings-feedback');
    const manualForm = document.getElementById('manual-booking-form');
    const manualBarber = document.getElementById('manual-barber');
    const manualDate = document.getElementById('manual-date');
    const manualTime = document.getElementById('manual-time');
    const manualName = document.getElementById('manual-name');
    const manualFeedback = document.getElementById('manual-booking-feedback');

    let currentCell = null;
    let currentAppointmentId = null;
    let currentBarber = null;
    let currentStart = null;
    let currentIsReserved = false;

    function buildManualTimeOptions() {
      const options = [];
      for (let hour = 9; hour < 21; hour++) {
        for (const minute of [0, 30]) {
          const label = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
          options.push(`<option value="${label}">${label}</option>`);
        }
      }
      manualTime.innerHTML = options.join('');
    }

    function setManualFeedback(message, type) {
      manualFeedback.textContent = message;
      manualFeedback.classList.toggle('success', type === 'success');
      manualFeedback.classList.toggle('error', type === 'error');
    }

    function setSettingsFeedback(message, type) {
      settingsFeedback.textContent = message;
      settingsFeedback.classList.toggle('success', type === 'success');
      settingsFeedback.classList.toggle('error', type === 'error');
    }

    async function changeAdminPassword() {
      const currentPassword = currentPasswordInput.value;
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (newPassword.length < 6) {
        setSettingsFeedback(t('passwordTooShort'), 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        setSettingsFeedback(t('passwordMismatch'), 'error');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/admin/password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword, newPassword })
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.success) {
          passwordForm.reset();
          setSettingsFeedback(t('passwordChanged'), 'success');
        } else {
          setSettingsFeedback(getLanguage() === 'en' ? (data.message || t('passwordFailed')) : t('passwordFailed'), 'error');
        }
      } catch (err) {
        setSettingsFeedback(t('passwordFailed'), 'error');
        console.error(err);
      }
    }

    function getManualStartISO() {
      if (!manualDate.value || !manualTime.value) return null;
      const start = new Date(`${manualDate.value}T${manualTime.value}:00`);
      return Number.isNaN(start.getTime()) ? null : start.toISOString();
    }

    function isManualSlotValid() {
      const start = new Date(`${manualDate.value}T${manualTime.value}:00`);
      const hour = start.getHours();
      const minute = start.getMinutes();
      return (
        !Number.isNaN(start.getTime()) &&
        start >= new Date() &&
        hour >= 9 &&
        hour < 21 &&
        [0, 30].includes(minute) &&
        start.getSeconds() === 0 &&
        start.getMilliseconds() === 0
      );
    }

    async function bookManualAppointment() {
      const customer = manualName.value.trim();
      const start = getManualStartISO();

      if (!manualBarber.value || !start || !customer) {
        setManualFeedback(t('manualMissing'), 'error');
        return;
      }

      if (!isManualSlotValid()) {
        setManualFeedback(t('manualUnavailable'), 'error');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/book`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            barber: manualBarber.value,
            start,
            customer
          })
        });
        const data = await res.json();

        if (res.ok && data.success) {
          setManualFeedback(t('manualSuccess'), 'success');
          manualName.value = '';
          await refreshCalendars();
        } else {
          setManualFeedback(t('manualUnavailable'), 'error');
        }
      } catch (err) {
        setManualFeedback(t('bookingError'), 'error');
        console.error(err);
      }
    }

    function openModal(cell) {
      currentCell = cell;
      currentAppointmentId = cell.dataset.id;
      currentBarber = cell.dataset.barber;
      currentStart = cell.dataset.start;
      currentIsReserved = cell.classList.contains('reserved');

      if (currentIsReserved) {
        modalTitle.textContent = t('cancelTitle');
        modalInfo.textContent = `${t('reservedInfo')}: ${cell.textContent}`;
        customerInput.style.display = 'none';
        btnBook.style.display = 'none';
        btnCancelBooking.style.display = 'inline-block';
      } else {
        modalTitle.textContent = t('bookTitle');
        const startDate = new Date(currentStart);
        modalInfo.textContent = `${t('barber')}: ${formatBarberName(currentBarber)}\n${t('timeLabel')}: ${formatDate(startDate)} ${formatTime(startDate)}`;
        customerInput.style.display = 'block';
        customerInput.value = '';
        btnBook.style.display = 'inline-block';
        btnCancelBooking.style.display = 'none';
      }
      feedback.textContent = '';
      modal.classList.add('active');
      customerInput.focus();
    }

    function closeModal() {
      modal.classList.remove('active');
      currentCell = null;
      currentAppointmentId = null;
      currentBarber = null;
      currentStart = null;
      currentIsReserved = false;
      feedback.textContent = '';
    }

    btnClose.onclick = closeModal;
    btnLogout.onclick = async () => {
      await fetch(`${API_BASE}/api/admin/logout`, { method: 'POST' });
      window.location.href = '/login.html';
    };
    btnSettings.onclick = () => {
      const isOpen = settingsPanel.classList.toggle('active');
      btnSettings.setAttribute('aria-expanded', String(isOpen));
      if (isOpen) currentPasswordInput.focus();
    };
    modal.onclick = e => {
      if (e.target === modal) closeModal();
    };

    // Book appointment handler
    btnBook.onclick = async () => {
      const customer = customerInput.value.trim();
      if (!customer) {
        feedback.textContent = t('nameRequired');
        return;
      }
      feedback.textContent = t('booking');

      try {
        const res = await fetch(`${API_BASE}/api/book`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            barber: currentBarber,
            start: currentStart,
            customer,
          }),
        });

        const data = await res.json();
        if (res.ok && data.success) {
          feedback.style.color = '#22c55e';
          feedback.textContent = t('booked');
          await refreshCalendars();
          setTimeout(closeModal, 1500);
        } else {
          feedback.style.color = '#dc2626';
          feedback.textContent = getLanguage() === 'en' ? (data.message || t('bookingFailed')) : t('bookingFailed');
        }
      } catch (e) {
        feedback.style.color = '#dc2626';
        feedback.textContent = t('bookingError');
        console.error(e);
      }
    };

    // Cancel appointment handler
    btnCancelBooking.onclick = async () => {
      if (!currentAppointmentId) return;
      feedback.textContent = t('cancelling');

      try {
        const res = await fetch(`${API_BASE}/api/cancel/${currentAppointmentId}`, {
          method: 'DELETE',
        });
        const data = await res.json();
        if (res.ok && data.success) {
          feedback.style.color = '#22c55e';
          feedback.textContent = t('cancelled');
          await refreshCalendars();
          setTimeout(closeModal, 1500);
        } else {
          feedback.style.color = '#dc2626';
          feedback.textContent = getLanguage() === 'en' ? (data.message || t('cancellationFailed')) : t('cancellationFailed');
        }
      } catch (e) {
        feedback.style.color = '#dc2626';
        feedback.textContent = t('cancellationError');
        console.error(e);
      }
    };

    async function refreshCalendars() {
      renderMobileControls();
      updateVisibleContainers();
      const visibleBarbers = mobileQuery.matches ? [selectedBarber] : barberNames;
      await Promise.all(visibleBarbers.map(barber => renderCalendar(barber)));
      attachCellListeners();
    }

    function scheduleCalendarRefresh() {
      clearTimeout(liveUpdateTimer);
      liveUpdateTimer = setTimeout(() => {
        refreshCalendars();
      }, 300);
    }

    function connectLiveUpdates() {
      if (!window.EventSource) return;

      const events = new EventSource(`${API_BASE}/api/events`);
      events.addEventListener('appointments-changed', scheduleCalendarRefresh);
    }

    // Attach click listeners to available and reserved cells
    function attachCellListeners() {
      document.querySelectorAll('td.available, td.reserved').forEach(cell => {
        cell.onclick = () => openModal(cell);
      });
    }

    document.getElementById('barber-tabs').addEventListener('click', e => {
      const barber = e.target.closest('[data-barber-tab]')?.dataset.barberTab;
      if (!barber) return;
      selectedBarber = barber;
      refreshCalendars();
    });

    document.getElementById('day-tabs').addEventListener('click', e => {
      const index = e.target.closest('[data-day-tab]')?.dataset.dayTab;
      if (index === undefined) return;
      selectedDayIndex = Number(index);
      refreshCalendars();
    });

    document.querySelector('.language-switch').addEventListener('click', e => {
      const language = e.target.closest('[data-lang-option]')?.dataset.langOption;
      if (language) setLanguage(language);
    });

    manualForm.addEventListener('submit', e => {
      e.preventDefault();
      bookManualAppointment();
    });

    passwordForm.addEventListener('submit', e => {
      e.preventDefault();
      changeAdminPassword();
    });

    mobileQuery.addEventListener('change', refreshCalendars);

    // Initial load
    buildManualTimeOptions();
    manualDate.min = toDateInputValue(new Date());
    applyLanguage();
    refreshCalendars();
    connectLiveUpdates();

  </script>
