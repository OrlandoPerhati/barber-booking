<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rezervo takim</title>
  <style>
    :root {
      --ink: #f6efe1;
      --muted-ink: #c7bcaa;
      --panel: rgba(9, 10, 10, 0.64);
      --panel-strong: rgba(8, 8, 7, 0.94);
      --line: rgba(207, 174, 112, 0.32);
      --line-strong: rgba(207, 174, 112, 0.56);
      --accent: #d0ad6a;
      --accent-strong: #f0d08b;
      --available: #8fa894;
      --available-hover: #a3bca7;
      --available-text: #101510;
      --reserved: #7b3037;
      --reserved-text: #fff1ec;
      --time-bg: rgba(7, 8, 8, 0.72);
      --cell-bg: rgba(246, 239, 225, 0.035);
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.46);
    }
    body {
      font-family: 'Trebuchet MS', 'Gill Sans', sans-serif;
      background:
        linear-gradient(rgba(3, 4, 4, 0.58), rgba(3, 4, 4, 0.78)),
        url('https://png.pngtree.com/background/20250125/original/pngtree-barber-shop-salon-setup-with-classic-chairs-and-elegant-mirrors-picture-image_16217040.jpg') center/cover fixed no-repeat;
      color: var(--ink);
      padding: 22px 18px 20px;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 {
      text-align: center;
      margin: 0 0 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-shadow: 0 10px 34px rgba(0, 0, 0, 0.56);
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      line-height: 1.2;
    }
    h2 {
      margin: 0;
      color: var(--accent);
      letter-spacing: 0.04em;
      font-weight: 600;
      font-size: 1rem;
    }
    .top-nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .top-nav a {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--ink);
      background: rgba(246, 239, 225, 0.055);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }
    .language-switch {
      display: inline-flex;
      gap: 5px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(7, 8, 8, 0.78);
    }
    .language-switch button {
      min-width: 42px;
      min-height: 30px;
      margin: 0;
      padding: 0 10px;
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      box-shadow: none;
      font-size: 13px;
    }
    .language-switch button.active {
      color: #101010;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }
    .container {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: nowrap;
    }
    .mobile-controls {
      display: none;
    }
    .custom-booking {
      max-width: 980px;
      margin: 0 auto 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(17, 18, 18, 0.78), var(--panel));
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
    }
    .custom-booking-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .custom-booking-header p {
      margin: 6px 0 0;
      color: var(--muted-ink);
      line-height: 1.45;
      font-size: 14px;
    }
    .custom-booking-form {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1.3fr auto;
      gap: 10px;
      align-items: end;
    }
    .custom-field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }
    .custom-field label {
      color: var(--muted-ink);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .custom-field input,
    .custom-field select {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(246, 239, 225, 0.065);
      color: var(--ink);
      font: inherit;
      box-sizing: border-box;
      min-width: 0;
      max-width: 100%;
    }
    .custom-field input[type="date"] {
      display: block;
      -webkit-appearance: none;
      appearance: none;
    }
    .custom-field select option {
      color: #101010;
    }
    .custom-booking button {
      min-height: 44px;
      margin: 0;
      padding: 0 18px;
      white-space: nowrap;
    }
    .custom-feedback {
      min-height: 20px;
      margin: 12px 0 0;
      font-weight: 700;
      line-height: 1.35;
    }
    .custom-feedback.success {
      color: #a9d8ad;
    }
    .custom-feedback.error {
      color: #ffb2a8;
    }
    .segmented-control,
    .day-strip {
      display: flex;
      gap: 8px;
    }
    .segmented-control button,
    .day-strip button {
      min-height: 44px;
      margin: 0;
      padding: 9px 12px;
      border: 1px solid var(--line);
      background: rgba(246, 239, 225, 0.055);
      color: var(--ink);
      box-shadow: none;
      font-size: 14px;
    }
    .segmented-control button.active,
    .day-strip button.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #101010;
    }
    .barber-container {
      background: linear-gradient(180deg, rgba(17, 18, 18, 0.78), var(--panel));
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px;
      box-shadow: var(--shadow);
      max-width: none;
      min-width: 0;
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    table {
      border-collapse: separate;
      border-spacing: 5px;
      width: 100%;
      table-layout: fixed;
      margin-top: 14px;
      background: transparent;
      font-size: 12px;
    }
    th, td {
      border: 1px solid rgba(207, 174, 112, 0.16);
      text-align: center;
      vertical-align: middle;
      width: calc((100% - 80px) / 7); /* 7 days columns */
      height: 32px;
      cursor: pointer;
      border-radius: 8px;
      padding: 4px 5px;
      box-sizing: border-box;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: background-color 0.25s ease, transform 0.2s ease;
      background: var(--cell-bg);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 8px 18px rgba(0, 0, 0, 0.12);
    }
    /* Time column */
    th.time-col, td.time-col {
      width: 62px;
      cursor: default;
      background: var(--time-bg);
      color: var(--accent);
      font-weight: 600;
      border-radius: 12px;
      font-size: 11px;
      line-height: 1.2;
      padding: 5px 4px;
      border-color: rgba(207, 174, 112, 0.24);
    }
    th {
      background: linear-gradient(180deg, rgba(207, 174, 112, 0.18), rgba(207, 174, 112, 0.055));
      color: var(--ink);
      font-weight: 600;
      height: 50px;
      font-size: 12px;
      line-height: 1.25;
      border-color: rgba(207, 174, 112, 0.28);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1), 0 10px 22px rgba(0, 0, 0, 0.12);
    }
    td.available {
      background: linear-gradient(180deg, rgba(169, 199, 173, 0.82), rgba(143, 168, 148, 0.76) 62%, rgba(119, 145, 124, 0.72));
      color: var(--available-text);
      font-weight: 600;
      border-color: rgba(166, 197, 171, 0.42);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.22), 0 10px 22px rgba(34, 54, 38, 0.14);
    }
    td.reserved {
      background: linear-gradient(180deg, rgba(128, 53, 61, 0.86), rgba(101, 39, 46, 0.78) 62%, rgba(76, 27, 33, 0.76));
      color: var(--reserved-text);
      cursor: default;
      font-weight: 500;
      border-color: rgba(160, 72, 82, 0.46);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 10px 22px rgba(50, 26, 22, 0.16);
    }
    td.available:hover {
      background: linear-gradient(180deg, rgba(188, 216, 191, 0.9), rgba(158, 188, 163, 0.82) 62%, rgba(134, 163, 139, 0.78));
      transform: translateY(-2px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24), 0 14px 26px rgba(34, 54, 38, 0.18);
    }
    td.no-slot {
      background: linear-gradient(180deg, rgba(246, 239, 225, 0.018), rgba(246, 239, 225, 0.006));
      border-color: rgba(207, 174, 112, 0.075);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }
    td.past {
      background: linear-gradient(180deg, rgba(132, 49, 55, 0.9), rgba(100, 35, 41, 0.82) 62%, rgba(73, 23, 29, 0.78));
      color: #fff4f1;
      cursor: default;
      font-weight: 700;
      border-color: rgba(177, 74, 83, 0.62);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18), 0 10px 22px rgba(67, 24, 20, 0.24);
    }
    button {
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #101010;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin-top: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }
    button:hover {
      filter: brightness(1.04);
    }
    /* Modal styles */
    #booking-modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.75);
      justify-content: center;
      align-items: center;
    }
    #booking-modal.active {
      display: flex;
    }
    #modal-content {
      background: linear-gradient(180deg, rgba(18, 18, 17, 0.98), var(--panel-strong));
      padding: 30px;
      border-radius: 24px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      width: 320px;
      text-align: center;
    }
    #modal-content h3 {
      margin-top: 0;
      margin-bottom: 15px;
      color: var(--accent);
    }
    #modal-content input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(246, 239, 225, 0.065);
      color: var(--ink);
      font-size: 16px;
      box-sizing: border-box;
    }
    #modal-content input::placeholder {
      color: var(--muted-ink);
    }
    #modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    #booking-feedback {
      margin-top: 10px;
      min-height: 18px;
      font-weight: 600;
    }
    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }
      .container {
        flex-wrap: wrap;
      }
      .barber-container {
        flex: 1 1 100%;
      }
      .custom-booking-form {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .custom-booking button {
        grid-column: 1 / -1;
      }
    }
    @media (max-width: 700px) {
      body {
        padding: 14px 10px 18px;
        background-attachment: scroll;
      }
      h1 {
        margin-bottom: 12px;
        font-size: 1.25rem;
      }
      .mobile-controls {
        display: grid;
        gap: 10px;
        margin: 0 auto 12px;
        max-width: 520px;
      }
      .custom-booking {
        margin-bottom: 12px;
        padding: 14px;
        border-radius: 16px;
      }
      .custom-booking-header {
        display: block;
      }
      .custom-booking-form {
        grid-template-columns: 1fr;
        width: 100%;
      }
      .custom-booking button {
        width: 100%;
      }
      .segmented-control {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .day-strip {
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: thin;
      }
      .day-strip button {
        flex: 0 0 76px;
        display: grid;
        gap: 2px;
        line-height: 1.15;
      }
      .day-strip small {
        color: inherit;
        font-size: 11px;
        opacity: 0.82;
      }
      .container {
        display: block;
      }
      .barber-container {
        display: none;
        padding: 12px;
        border-radius: 16px;
      }
      .barber-container.active {
        display: flex;
      }
      h2 {
        font-size: 1.05rem;
      }
      table {
        border-spacing: 7px;
        font-size: 14px;
      }
      th, td {
        height: 52px;
        border-radius: 14px;
        font-size: 14px;
      }
      th.time-col,
      td.time-col {
        width: 72px;
        font-size: 12px;
      }
      #modal-content {
        width: min(92vw, 360px);
        padding: 22px;
        border-radius: 18px;
      }
      #modal-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <h1 data-i18n="pageTitle">Rezervo takim</h1>
  <div class="top-nav">
    <a href="/" data-i18n="overview">Info</a>
    <a href="/admin.html" data-i18n="admin">Admin</a>
    <div class="language-switch" aria-label="Language">
      <button type="button" data-lang-option="sq">AL</button>
      <button type="button" data-lang-option="en">EN</button>
    </div>
  </div>
  <div class="mobile-controls" aria-label="Booking filters">
    <div class="segmented-control" id="barber-tabs"></div>
    <div class="day-strip" id="day-tabs"></div>
  </div>
  <section class="custom-booking" aria-labelledby="custom-booking-title">
    <div class="custom-booking-header">
      <div>
        <h2 id="custom-booking-title" data-i18n="customTitle">Rezervo me datë dhe orë</h2>
        <p data-i18n="customIntro">Zgjidh berberin, datën dhe orarin. Nëse orari është i zënë, rezervimi nuk kryhet.</p>
      </div>
    </div>
    <form class="custom-booking-form" id="custom-booking-form">
      <div class="custom-field">
        <label for="custom-barber" data-i18n="customBarber">Berberi</label>
        <select id="custom-barber" required>
          <option value="deni">Deni</option>
          <option value="cerri">Cerri</option>
        </select>
      </div>
      <div class="custom-field">
        <label for="custom-date" data-i18n="customDate">Data</label>
        <input type="date" id="custom-date" required />
      </div>
      <div class="custom-field">
        <label for="custom-time" data-i18n="customTime">Ora</label>
        <select id="custom-time" required></select>
      </div>
      <div class="custom-field">
        <label for="custom-name" data-i18n="customName">Emri</label>
        <input type="text" id="custom-name" data-i18n-placeholder="namePlaceholder" placeholder="Shkruaj emrin" required />
      </div>
      <button type="submit" data-i18n="customSubmit">Kontrollo dhe rezervo</button>
    </form>
    <p class="custom-feedback" id="custom-booking-feedback" aria-live="polite"></p>
  </section>
  <div class="container">
    <div class="barber-container" id="deni-container">
      <h2 data-i18n="bookDeni">Rezervo me Denin</h2>
      <table id="deni-calendar"></table>
    </div>
    <div class="barber-container" id="cerri-container">
      <h2 data-i18n="bookCerri">Rezervo me Cerrin</h2>
      <table id="cerri-calendar"></table>
    </div>
  </div>

  <!-- Modal -->
  <div id="booking-modal">
    <div id="modal-content">
      <h3 data-i18n="modalTitle">Rezervo takim</h3>
      <p id="modal-info"></p>
      <input type="text" id="customer-name" data-i18n-placeholder="namePlaceholder" placeholder="Shkruaj emrin" />
      <div id="modal-buttons">
        <button id="confirm-booking" data-i18n="confirm">Konfirmo</button>
        <button id="cancel-booking" data-i18n="cancel">Anulo</button>
      </div>
      <p id="booking-feedback"></p>
    </div>
  </div>

  <script>
    const barberNames = ['deni', 'cerri'];
    const DAY_LABELS = {
      sq: ['Die', 'Hen', 'Mar', 'Mer', 'Enj', 'Pre', 'Sht'],
      en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat']
    };
    const API_BASE = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';
    const mobileQuery = window.matchMedia('(max-width: 700px)');
    let selectedBarber = barberNames[0];
    let selectedDayIndex = 0;
    let liveUpdateTimer = null;
    const translations = {
      sq: {
        documentTitle: 'Rezervo takim',
        pageTitle: 'Rezervo takim',
        overview: 'Info',
        admin: 'Admin',
        bookDeni: 'Rezervo me Denin',
        bookCerri: 'Rezervo me Cerrin',
        modalTitle: 'Rezervo takim',
        namePlaceholder: 'Shkruaj emrin',
        confirm: 'Konfirmo',
        cancel: 'Anulo',
        time: 'Ora',
        passed: 'Kaluar',
        passedTitle: 'Ky orar ka kaluar',
        reservedTitle: 'Orar i rezervuar',
        availableTitle: 'Orar i lirë',
        noSlotTitle: 'Nuk ka orar të disponueshëm',
        nameRequired: 'Ju lutem shkruani emrin.',
        booked: 'Takimi u rezervua!',
        bookingFailed: 'Rezervimi dështoi.',
        customTitle: 'Rezervo me datë dhe orë',
        customIntro: 'Zgjidh berberin, datën dhe orarin. Nëse orari është i zënë, rezervimi nuk kryhet.',
        customBarber: 'Berberi',
        customDate: 'Data',
        customTime: 'Ora',
        customName: 'Emri',
        customSubmit: 'Kontrollo dhe rezervo',
        customMissing: 'Plotëso datën, orën, berberin dhe emrin.',
        customInvalid: 'Rezervimi nuk është i disponueshëm. Zgjidh një datë ose orar tjetër.',
        customUnavailable: 'Rezervimi nuk është i disponueshëm. Zgjidh një datë ose orar tjetër.',
        customSuccess: 'Takimi u rezervua me sukses!'
      },
      en: {
        documentTitle: 'Book an Appointment',
        pageTitle: 'Book an Appointment',
        overview: 'Overview',
        admin: 'Admin',
        bookDeni: 'Book with Deni',
        bookCerri: 'Book with Cerri',
        modalTitle: 'Book Appointment',
        namePlaceholder: 'Enter your name',
        confirm: 'Confirm',
        cancel: 'Cancel',
        time: 'Time',
        passed: 'Passed',
        passedTitle: 'This time has already passed',
        reservedTitle: 'Reserved slot',
        availableTitle: 'Available slot',
        noSlotTitle: 'No appointment slot available',
        nameRequired: 'Please enter your name.',
        booked: 'Appointment booked!',
        bookingFailed: 'Booking failed.',
        customTitle: 'Book by date and time',
        customIntro: 'Choose the barber, date, and time. If that time is taken, the booking will not go through.',
        customBarber: 'Barber',
        customDate: 'Date',
        customTime: 'Time',
        customName: 'Name',
        customSubmit: 'Check and book',
        customMissing: 'Please fill in the date, time, barber, and name.',
        customInvalid: 'Appointment unavailable. Choose a different date or time.',
        customUnavailable: 'Booking not available. Choose a different date or time.',
        customSuccess: 'Appointment booked successfully!'
      }
    };

    function getLanguage() {
      return localStorage.getItem('haircuttime_language') || 'sq';
    }

    function t(key) {
      return translations[getLanguage()][key];
    }

    function dayLabel(date) {
      return DAY_LABELS[getLanguage()][date.getDay()];
    }

    function applyLanguage() {
      const language = getLanguage();
      document.documentElement.lang = language;
      document.title = translations[language].documentTitle;

      document.querySelectorAll('[data-i18n]').forEach(element => {
        element.textContent = translations[language][element.dataset.i18n];
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(element => {
        element.placeholder = translations[language][element.dataset.i18nPlaceholder];
      });

      document.querySelectorAll('[data-lang-option]').forEach(button => {
        button.classList.toggle('active', button.dataset.langOption === language);
      });
    }

    function setLanguage(language) {
      localStorage.setItem('haircuttime_language', language);
      applyLanguage();
      renderCalendars();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getNext7Days() {
      const now = new Date();
      const days = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(now);
        d.setHours(0,0,0,0);
        d.setDate(now.getDate() + i);
        days.push(d);
      }
      return days;
    }

    function formatBarberName(barber) {
      return barber.charAt(0).toUpperCase() + barber.slice(1);
    }

    function formatDate(date) {
      const day = String(date.getDate()).padStart(2, '0');
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const year = String(date.getFullYear()).slice(-2);
      return `${day}/${month}/${year}`;
    }

    function formatTime(date) {
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function getVisibleDays() {
      const days = getNext7Days();
      return mobileQuery.matches ? [days[selectedDayIndex]] : days;
    }

    function updateVisibleContainers() {
      barberNames.forEach(barber => {
        const container = document.getElementById(`${barber}-container`);
        container.classList.toggle('active', !mobileQuery.matches || barber === selectedBarber);
      });
    }

    function renderMobileControls() {
      const barberTabs = document.getElementById('barber-tabs');
      const dayTabs = document.getElementById('day-tabs');
      const days = getNext7Days();

      barberTabs.innerHTML = barberNames.map(barber => `
        <button type="button" class="${barber === selectedBarber ? 'active' : ''}" data-barber-tab="${barber}">
          ${formatBarberName(barber)}
        </button>
      `).join('');

      dayTabs.innerHTML = days.map((day, index) => `
        <button type="button" class="${index === selectedDayIndex ? 'active' : ''}" data-day-tab="${index}">
          ${dayLabel(day)}
          <small>${formatDate(day)}</small>
        </button>
      `).join('');
    }

    async function fetchAppointments(barber) {
      const res = await fetch(`${API_BASE}/appointments/${barber}`);
      const data = await res.json();
      return data;
    }

    function createTableHeader(days) {
      let thead = `<tr><th class="time-col">${t('time')}</th>`;
      for(let day of days) {
        thead += `<th>${dayLabel(day)}<br>${formatDate(day)}</th>`;
      }
      thead += '</tr>';
      return thead;
    }

    function createTableBody(appointments, days, barber) {
      const startHour = 9;
      const slotsPerDay = 24; // 12 hours * 2 (half-hour slots)
      const now = new Date();

      let tbody = '';

      for (let slotIndex = 0; slotIndex < slotsPerDay; slotIndex++) {
        const slotHour = startHour + Math.floor(slotIndex / 2);
        const slotMinute = (slotIndex % 2) * 30;
        const timeLabel = `${String(slotHour).padStart(2, '0')}:${slotMinute === 0 ? '00' : '30'}`;

        tbody += `<tr><td class="time-col">${timeLabel}</td>`;

        for (let dayIndex = 0; dayIndex < days.length; dayIndex++) {
          const day = days[dayIndex];
          const slotStart = new Date(day);
          slotStart.setHours(slotHour, slotMinute, 0, 0);
          const isToday = slotStart.toDateString() === now.toDateString();

          if (isToday && slotStart < now) {
            tbody += `<td class="past" title="${t('passedTitle')}">${t('passed')}</td>`;
            continue;
          }

          // Find appointment exactly matching this slot (year, month, day, hour, minute)
          const appointment = appointments.find(app => {
            const appStart = new Date(app.start);
            return (
              appStart.getFullYear() === slotStart.getFullYear() &&
              appStart.getMonth() === slotStart.getMonth() &&
              appStart.getDate() === slotStart.getDate() &&
              appStart.getHours() === slotStart.getHours() &&
              appStart.getMinutes() === slotStart.getMinutes()
            );
          });

          if (appointment && appointment.reserved) {
            tbody += `<td class="reserved" title="${t('reservedTitle')}">
                        ${timeLabel}
                      </td>`;
          } else if (appointment) {
            tbody += `<td class="available" data-barber="${escapeHtml(barber)}" data-start="${escapeHtml(slotStart.toISOString())}" title="${t('availableTitle')}">
                        ${timeLabel}
                      </td>`;
          } else {
            tbody += `<td class="no-slot" title="${t('noSlotTitle')}"></td>`;
          }
        }
        tbody += '</tr>';
      }
      return tbody;
    }

    async function renderCalendar(barber) {
      const calendar = document.getElementById(`${barber}-calendar`);
      const appointments = await fetchAppointments(barber);
      const days = getVisibleDays();

      const thead = createTableHeader(days);
      const tbody = createTableBody(appointments, days, barber);

      calendar.innerHTML = thead + tbody;
    }

    async function renderCalendars() {
      renderMobileControls();
      updateVisibleContainers();
      const visibleBarbers = mobileQuery.matches ? [selectedBarber] : barberNames;
      await Promise.all(visibleBarbers.map(barber => renderCalendar(barber)));
    }

    function scheduleCalendarRefresh() {
      clearTimeout(liveUpdateTimer);
      liveUpdateTimer = setTimeout(() => {
        renderCalendars();
      }, 300);
    }

    function connectLiveUpdates() {
      if (!window.EventSource) return;

      const events = new EventSource(`${API_BASE}/api/events`);
      events.addEventListener('appointments-changed', scheduleCalendarRefresh);
    }

    const modal = document.getElementById('booking-modal');
    const modalInfo = document.getElementById('modal-info');
    const customerInput = document.getElementById('customer-name');
    const feedback = document.getElementById('booking-feedback');
    const customForm = document.getElementById('custom-booking-form');
    const customBarber = document.getElementById('custom-barber');
    const customDate = document.getElementById('custom-date');
    const customTime = document.getElementById('custom-time');
    const customName = document.getElementById('custom-name');
    const customFeedback = document.getElementById('custom-booking-feedback');
    let selectedSlot = null;

    function toDateInputValue(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function buildTimeOptions() {
      const options = [];
      for (let hour = 9; hour < 21; hour++) {
        for (const minute of [0, 30]) {
          const label = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
          options.push(`<option value="${label}">${label}</option>`);
        }
      }
      customTime.innerHTML = options.join('');
    }

    function setCustomFeedback(message, type) {
      customFeedback.textContent = message;
      customFeedback.classList.toggle('success', type === 'success');
      customFeedback.classList.toggle('error', type === 'error');
    }

    function getCustomStartISO() {
      if (!customDate.value || !customTime.value) return null;
      const start = new Date(`${customDate.value}T${customTime.value}:00`);
      return Number.isNaN(start.getTime()) ? null : start.toISOString();
    }

    function isCustomSlotValid() {
      const start = new Date(`${customDate.value}T${customTime.value}:00`);
      const hour = start.getHours();
      const minute = start.getMinutes();
      return (
        !Number.isNaN(start.getTime()) &&
        start >= new Date() &&
        hour >= 9 &&
        hour < 21 &&
        [0, 30].includes(minute) &&
        start.getSeconds() === 0 &&
        start.getMilliseconds() === 0
      );
    }

    async function bookCustomAppointment() {
      const name = customName.value.trim();
      const start = getCustomStartISO();

      if (!customBarber.value || !start || !name) {
        setCustomFeedback(t('customMissing'), 'error');
        return;
      }

      if (!isCustomSlotValid()) {
        setCustomFeedback(t('customInvalid'), 'error');
        return;
      }

      const res = await fetch(`${API_BASE}/api/book`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          barber: customBarber.value,
          start,
          customer: name
        })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        setCustomFeedback(t('customSuccess'), 'success');
        customName.value = '';
        renderCalendars();
      } else {
        setCustomFeedback(t('customUnavailable'), 'error');
      }
    }

    function openModal(barber, startISO) {
      selectedSlot = { barber, start: startISO };
      const startDate = new Date(startISO);
      modalInfo.textContent = `${formatBarberName(barber)} - ${formatDate(startDate)} ${formatTime(startDate)}`;
      customerInput.value = '';
      feedback.textContent = '';
      feedback.style.color = '';
      modal.classList.add('active');
      customerInput.focus();
    }

    function closeModal() {
      selectedSlot = null;
      modal.classList.remove('active');
      feedback.textContent = '';
      feedback.style.color = '';
    }

    document.body.addEventListener('click', e => {
      if(e.target.classList.contains('available')) {
        const barber = e.target.dataset.barber;
        const start = e.target.dataset.start;
        openModal(barber, start);
      }
    });

    document.getElementById('confirm-booking').addEventListener('click', async () => {
      feedback.textContent = ''; // clear previous feedback
      const name = customerInput.value.trim();
      if(!name) {
        feedback.textContent = t('nameRequired');
        feedback.style.color = '#dc2626'; // red
        return;
      }
      if (!selectedSlot) return;

      const res = await fetch(`${API_BASE}/api/book`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          barber: selectedSlot.barber,
          start: selectedSlot.start,
          customer: name
        })
      });
      const data = await res.json();

      if (res.ok && data.success) {
        feedback.style.color = '#22c55e'; // green
        feedback.textContent = t('booked');
        setTimeout(() => {
          closeModal();
          renderCalendars();
        }, 1500);
      } else {
        feedback.style.color = '#dc2626'; // red
        feedback.textContent = getLanguage() === 'en' ? (data.message || t('bookingFailed')) : t('bookingFailed');
      }
    });

    document.getElementById('cancel-booking').addEventListener('click', () => {
      closeModal();
    });

    modal.addEventListener('click', e => {
      if(e.target === modal) {
        closeModal();
      }
    });

    document.getElementById('barber-tabs').addEventListener('click', e => {
      const barber = e.target.closest('[data-barber-tab]')?.dataset.barberTab;
      if (!barber) return;
      selectedBarber = barber;
      renderCalendars();
    });

    document.getElementById('day-tabs').addEventListener('click', e => {
      const index = e.target.closest('[data-day-tab]')?.dataset.dayTab;
      if (index === undefined) return;
      selectedDayIndex = Number(index);
      renderCalendars();
    });

    customForm.addEventListener('submit', e => {
      e.preventDefault();
      bookCustomAppointment();
    });

    document.querySelector('.language-switch').addEventListener('click', e => {
      const language = e.target.closest('[data-lang-option]')?.dataset.langOption;
      if (language) setLanguage(language);
    });

    mobileQuery.addEventListener('change', renderCalendars);
    buildTimeOptions();
    customDate.min = toDateInputValue(new Date());
    applyLanguage();
    renderCalendars();
    connectLiveUpdates();
  </script>
</body>
</html>
