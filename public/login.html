<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Hyrje</title>
  <style>
    :root {
      --ink: #f6efe1;
      --muted-ink: #c7bcaa;
      --panel: rgba(8, 8, 7, 0.94);
      --line: rgba(207, 174, 112, 0.34);
      --accent: #d0ad6a;
      --accent-strong: #f0d08b;
      --error: #ffb2a8;
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.46);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Trebuchet MS", "Gill Sans", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(rgba(3, 4, 4, 0.58), rgba(3, 4, 4, 0.78)),
        url("https://png.pngtree.com/background/20250125/original/pngtree-barber-shop-salon-setup-with-classic-chairs-and-elegant-mirrors-picture-image_16217040.jpg") center/cover fixed no-repeat;
    }

    main {
      width: min(100%, 360px);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(18, 18, 17, 0.98), var(--panel));
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 20px;
      font-size: 1.35rem;
      letter-spacing: 0.03em;
      color: var(--accent);
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted-ink);
      font-size: 0.95rem;
    }

    input,
    button {
      width: 100%;
      min-height: 46px;
      border-radius: 12px;
      font: inherit;
    }

    input {
      border: 1px solid var(--line);
      padding: 0 12px;
      color: var(--ink);
      background: rgba(246, 239, 225, 0.065);
    }

    button {
      margin-top: 16px;
      border: 0;
      cursor: pointer;
      font-weight: 700;
      color: #101010;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }

    #feedback {
      min-height: 20px;
      margin: 14px 0 0;
      color: var(--error);
      font-weight: 700;
    }
    .language-switch {
      display: inline-flex;
      gap: 5px;
      padding: 4px;
      margin-bottom: 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(7, 8, 8, 0.78);
    }
    .language-switch button {
      width: auto;
      min-width: 42px;
      min-height: 30px;
      margin: 0;
      padding: 0 10px;
      border-radius: 999px;
      background: transparent;
      color: var(--ink);
      font-size: 13px;
      box-shadow: none;
    }
    .language-switch button.active {
      color: #101010;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    }
  </style>
</head>
<body>
  <main>
    <div class="language-switch" aria-label="Language">
      <button type="button" data-lang-option="sq">AL</button>
      <button type="button" data-lang-option="en">EN</button>
    </div>
    <h1 data-i18n="title">Hyrje admin</h1>
    <form id="login-form">
      <label for="password" data-i18n="password">Fjalëkalimi</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />
      <button type="submit" data-i18n="login">Hyr</button>
      <p id="feedback"></p>
    </form>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const feedback = document.getElementById('feedback');
    const translations = {
      sq: {
        documentTitle: 'Admin - Hyrje',
        title: 'Hyrje admin',
        password: 'Fjalëkalimi',
        login: 'Hyr',
        failed: 'Hyrja dështoi'
      },
      en: {
        documentTitle: 'Admin Login - Barber Appointments',
        title: 'Admin Login',
        password: 'Password',
        login: 'Log In',
        failed: 'Login failed'
      }
    };

    function getLanguage() {
      return localStorage.getItem('haircuttime_language') || 'sq';
    }

    function t(key) {
      return translations[getLanguage()][key];
    }

    function setLanguage(language) {
      localStorage.setItem('haircuttime_language', language);
      document.documentElement.lang = language;
      document.title = translations[language].documentTitle;

      document.querySelectorAll('[data-i18n]').forEach(element => {
        element.textContent = translations[language][element.dataset.i18n];
      });

      document.querySelectorAll('[data-lang-option]').forEach(button => {
        button.classList.toggle('active', button.dataset.langOption === language);
      });
    }

    document.querySelector('.language-switch').addEventListener('click', event => {
      const language = event.target.closest('[data-lang-option]')?.dataset.langOption;
      if (language) setLanguage(language);
    });

    form.addEventListener('submit', async event => {
      event.preventDefault();
      feedback.textContent = '';

      const password = new FormData(form).get('password');
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });

      if (res.ok) {
        window.location.href = '/admin.html';
        return;
      }

      const data = await res.json().catch(() => ({}));
      feedback.textContent = getLanguage() === 'en' ? (data.message || t('failed')) : t('failed');
    });

    setLanguage(getLanguage());
  </script>
</body>
</html>
